<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ do Pica-Pau</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* IMAGEM DE FUNDO - Link atualizado e estável */
            background-image: url('https://i.imgur.com/3f0Z4yW.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #e62020; /* Cor de reserva caso a imagem falhe */
        }

        /* Card principal com efeito de transparência */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 5px solid #ffc107; /* Borda Amarela */
        }

        h2 { color: #e62020; font-size: 24px; margin-bottom: 20px; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn-busca {
            background-color: #e62020;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #resultado {
            display: none;
            text-align: left;
            background: #fff8e1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ffc107;
            margin-top: 20px;
        }

        .info { margin-bottom: 8px; font-size: 14px; }
        .info strong { color: #e62020; }

        .btn-pdf {
            background-color: #2196F3; /* Azul do Pica-pau */
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pica-Pau Consulta CNPJ 🪵</h2>
    
    <div class="search-box">
        <input type="text" id="cnpjInput" placeholder="CNPJ (apenas números)">
        <button class="btn-busca" onclick="buscar()">Buscar</button>
    </div>

    <div id="resultado">
        <div id="dadosEmpresa"></div>
        <button class="btn-pdf" onclick="gerarPDF()">📄 Baixar PDF</button>
    </div>
</div>

<script>
    async function buscar() {
        const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
        if (cnpj.length !== 14) return alert("CNPJ inválido!");

        try {
            const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            const data = await res.json();

            if (res.ok) {
                document.getElementById('dadosEmpresa').innerHTML = `
                    <div class="info"><strong>Razão Social:</strong> ${data.razao_social}</div>
                    <div class="info"><strong>Nome Fantasia:</strong> ${data.nome_fantasia || '---'}</div>
                    <div class="info"><strong>CNPJ:</strong> ${data.cnpj}</div>
                    <div class="info"><strong>Capital Social:</strong> R$ ${data.capital_social.toLocaleString('pt-BR')}</div>
                    <div class="info"><strong>Endereço:</strong> ${data.logradouro}, ${data.numero}</div>
                    <div class="info"><strong>Cidade/UF:</strong> ${data.municipio} - ${data.uf}</div>
                `;
                document.getElementById('resultado').style.display = 'block';
            } else {
                alert("Não achei essa empresa!");
            }
        } catch (e) {
            alert("Erro ao buscar dados.");
        }
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatorio CNPJ", 10, 10);
        const texto = document.getElementById('dadosEmpresa').innerText;
        doc.text(texto, 10, 20);
        doc.save("cnpj-pica-pau.pdf");
    }
</script>

</body>
</html>
