<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ - Pica-Pau Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Design focado nas cores do personagem: Azul, Vermelho e Amarelo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0056b3; /* Azul do corpo do Pica-Pau */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-top: 10px solid #e62020; /* Crista vermelha */
            border-bottom: 10px solid #ffc107; /* Bico amarelo */
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #0056b3;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-busca {
            background-color: #e62020;
            color: white;
        }

        .btn-busca:hover {
            background-color: #b01818;
        }

        /* Área de Resultado */
        #resultado {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #ffc107;
        }

        .campo-info {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
            line-height: 1.4;
        }

        .campo-info strong {
            color: #000;
        }

        .btn-pdf {
            background-color: #ffc107;
            color: #333;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .btn-pdf:hover {
            background-color: #e0a800;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔎 Consulta de CNPJ</h2>
    
    <div class="input-group">
        <input type="text" id="cnpjInput" placeholder="Digite apenas os números" maxlength="14">
        <button class="btn-busca" onclick="consultarCNPJ()">Buscar</button>
    </div>

    <div id="resultado">
        <div id="conteudoDados">
            </div>
        <button class="btn-pdf" onclick="gerarRelatorioPDF()">📄 Gerar Relatório PDF</button>
    </div>
    
    <div class="footer">He-he-he-he-he! Projeto de Aluno</div>
</div>

<script>
    async function consultarCNPJ() {
        const input = document.getElementById('cnpjInput').value.replace(/\D/g, '');
        const painel = document.getElementById('resultado');
        const conteudo = document.getElementById('conteudoDados');

        if (input.length !== 14) {
            alert("Por favor, insira um CNPJ válido com 14 dígitos.");
            return;
        }

        conteudo.innerHTML = "Carregando...";
        painel.style.display = "block";

        try {
            const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${input}`);
            const data = await response.json();

            if (response.ok) {
                conteudo.innerHTML = `
                    <div class="campo-info"><strong>Razão Social:</strong> ${data.razao_social}</div>
                    <div class="campo-info"><strong>Nome Fantasia:</strong> ${data.nome_fantasia || 'N/A'}</div>
                    <div class="campo-info"><strong>CNPJ:</strong> ${data.cnpj}</div>
                    <div class="campo-info"><strong>Atividade Principal:</strong> ${data.cnae_fiscal_descricao}</div>
                    <div class="campo-info"><strong>Capital Social:</strong> R$ ${data.capital_social.toLocaleString('pt-BR')}</div>
                    <div class="campo-info"><strong>Endereço:</strong> ${data.logradouro}, ${data.numero} - ${data.bairro}</div>
                    <div class="campo-info"><strong>Cidade/UF:</strong> ${data.municipio} - ${data.uf}</div>
                    <div class="campo-info"><strong>Telefone:</strong> ${data.ddd_telefone_1 || 'Não informado'}</div>
                    <div class="campo-info"><strong>Situação Cadastral:</strong> ${data.situacao_cadastral}</div>
                `;
            } else {
                conteudo.innerHTML = "❌ CNPJ não encontrado ou erro na base da Receita.";
            }
        } catch (error) {
            conteudo.innerHTML = "⚠️ Erro ao conectar com o serviço de busca.";
        }
    }

    function gerarRelatorioPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const dadosTexto = document.getElementById('conteudoDados').innerText;
        
        doc.setFontSize(18);
        doc.setTextColor(230, 32, 32);
        doc.text("Relatório de Consulta de CNPJ", 10, 20);
        
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        
        // Divide o texto para não sair da folha
        const linhas = doc.splitTextToSize(dadosTexto, 180);
        doc.text(linhas, 10, 40);
        
        doc.save("consulta_cnpj.pdf");
    }
</script>

</body>
</html>
