<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ Ultra Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --text-main: #ffffff;
            --text-detail: #e2e8f0;
            /* Transparência máxima para o vidro */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.pexels.com/photos/271905/pexels-photo-271905.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .dashboard {
            background: rgba(0, 0, 0, 0.25); /* Fundo escuro sutil para destacar o vidro */
            width: 100%;
            max-width: 850px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            backdrop-filter: blur(20px); /* Desfoque intenso */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .header h1 { margin: 0; font-size: 28px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .header p { margin: 10px 0 0; opacity: 0.8; font-size: 14px; }

        .search-section {
            padding: 50px 30px;
            display: flex;
            justify-content: center;
        }

        .input-container {
            display: flex;
            width: 100%;
            max-width: 550px;
            gap: 15px;
        }

        input {
            flex: 1;
            padding: 18px 25px;
            /* ULTRA TRANSLÚCIDO */
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            font-size: 18px;
            color: white;
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-search { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-search:hover { 
            transform: translateY(-3px); 
            background: #2563eb;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        #result-area {
            display: none;
            padding: 0 30px 40px 30px;
            animation: slideUp 0.6s ease-out;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .info-card {
            /* CARDS TAMBÉM TRANSLÚCIDOS */
            background: rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 6px;
        }

        .value {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
        }

        .btn-pdf { 
            background: var(--success); 
            color: white; 
            width: 100%; 
            margin-top: 30px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .input-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Consulta Empresarial</h1>
        <p>Transparência total nos dados da Receita Federal</p>
    </div>

    <div class="search-section">
        <div class="input-container">
            <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18">
            <button class="btn-search" id="btnSearch" onclick="fetchCNPJ()">Consultar</button>
        </div>
    </div>

    <div id="result-area">
        <div class="data-grid" id="dataDisplay"></div>
        <button class="btn-pdf" onclick="generatePDF()">📄 Gerar Relatório PDF</button>
    </div>
</div>

<script>
    const inputCNPJ = document.getElementById('cnpjInput');
    inputCNPJ.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 14) value = value.slice(0, 14);
        value = value.replace(/^(\d{2})(\d)/, "$1.$2");
        value = value.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
        value = value.replace(/\.(\d{3})(\d)/, ".$1/$2");
        value = value.replace(/(\d{4})(\d)/, "$1-$2");
        e.target.value = value;
    });

    async function fetchCNPJ() {
        const rawValue = document.getElementById('cnpjInput').value;
        const cnpj = rawValue.replace(/\D/g, '');
        if (cnpj.length !== 14) { alert("Digite os 14 números do CNPJ."); return; }

        const btn = document.getElementById('btnSearch');
        btn.disabled = true;
        btn.innerText = "...";

        try {
            const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            const data = await response.json();
            if (response.ok) { renderData(data); } 
            else { alert("CNPJ não encontrado."); }
        } catch (error) { alert("Erro de conexão."); } 
        finally { btn.disabled = false; btn.innerText = "Consultar"; }
    }

    function renderData(data) {
        const display = document.getElementById('dataDisplay');
        document.getElementById('result-area').style.display = 'block';

        const fields = [
            { label: "Razão Social", value: data.razao_social },
            { label: "Nome Fantasia", value: data.nome_fantasia || "Não informado" },
            { label: "CNPJ", value: data.cnpj },
            { label: "Status", value: data.situacao_cadastral },
            { label: "Abertura", value: data.data_inicio_atividade },
            { label: "Capital", value: `R$ ${data.capital_social.toLocaleString('pt-BR')}` },
            { label: "Atividade", value: data.cnae_fiscal_descricao },
            { label: "Endereço", value: `${data.logradouro}, ${data.numero} - ${data.municipio}/${data.uf}` },
            { label: "Telefone", value: data.ddd_telefone_1 || "N/A" },
            { label: "Natureza Jurídica", value: data.natureza_juridica }
        ];

        display.innerHTML = fields.map(field => `
            <div class="info-card">
                <span class="label">${field.label}</span>
                <span class="value">${field.value}</span>
            </div>
        `).join('');

        setTimeout(() => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 100);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("Relatório Cadastral CNPJ", 20, 20);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Gerado em: ${new Date().toLocaleString()}`, 20, 30);
        doc.line(20, 35, 190, 35);
        let y = 45;
        document.querySelectorAll('.info-card').forEach(card => {
            const label = card.querySelector('.label').innerText;
            const value = card.querySelector('.value').innerText;
            doc.setFont("helvetica", "bold");
            doc.text(`${label}:`, 20, y);
            doc.setFont("helvetica", "normal");
            const splitValue = doc.splitTextToSize(value, 120);
            doc.text(splitValue, 70, y);
            y += (splitValue.length * 8);
            if (y > 275) { doc.addPage(); y = 20; }
        });
        doc.save("consulta_cnpj.pdf");
    }
</script>

</body>
</html>
