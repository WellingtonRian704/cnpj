<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ - Pica-Pau Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0056b3; /* Azul Pica-pau */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
            border: 4px solid #ffc107; /* Borda Amarela */
        }

        /* IMAGEM DO PERSONAGEM */
        .personagem {
            width: 150px;
            margin-bottom: 15px;
        }

        h2 {
            color: #e62020;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        .search-area {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        .btn-busca {
            background-color: #e62020;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #resultado {
            display: none;
            text-align: left;
            background-color: #fdfdfd;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-top: 15px;
        }

        .linha {
            font-size: 14px;
            margin-bottom: 8px;
            color: #333;
        }

        .linha strong { color: #e62020; }

        .btn-pdf {
            background-color: #ffc107;
            color: #000;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/pt/thumb/9/9f/Pica-Pau_personagem.png/200px-Pica-Pau_personagem.png" alt="Pica Pau" class="personagem">
    
    <h2>Consulta CNPJ</h2>
    
    <div class="search-area">
        <input type="text" id="cnpjInput" placeholder="Digite o CNPJ (só números)">
        <button class="btn-busca" onclick="buscar()">BUSCAR</button>
    </div>

    <div id="resultado">
        <div id="dados"></div>
        <button class="btn-pdf" onclick="gerarPDF()">📄 GERAR PDF</button>
    </div>
</div>

<script>
    async function buscar() {
        const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
        if (cnpj.length !== 14) return alert("Digite 14 números!");

        try {
            const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            const data = await res.json();

            if (res.ok) {
                document.getElementById('dados').innerHTML = `
                    <div class="linha"><strong>Razão Social:</strong> ${data.razao_social}</div>
                    <div class="linha"><strong>Nome Fantasia:</strong> ${data.nome_fantasia || 'N/A'}</div>
                    <div class="linha"><strong>CNPJ:</strong> ${data.cnpj}</div>
                    <div class="linha"><strong>Capital Social:</strong> R$ ${data.capital_social.toLocaleString('pt-BR')}</div>
                    <div class="linha"><strong>Endereço:</strong> ${data.logradouro}, ${data.numero}</div>
                    <div class="linha"><strong>Cidade/UF:</strong> ${data.municipio}/${data.uf}</div>
                    <div class="linha"><strong>Situação:</strong> ${data.situacao_cadastral}</div>
                `;
                document.getElementById('resultado').style.display = 'block';
            } else {
                alert("CNPJ não encontrado!");
            }
        } catch (e) { alert("Erro na consulta!"); }
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.setTextColor(230, 32, 32);
        doc.text("Relatório de Consulta CNPJ", 15, 20);
        
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        const info = document.getElementById('dados').innerText;
        doc.text(info, 15, 40);
        doc.save("consulta-cnpj.pdf");
    }
</script>

</body>
</html>
